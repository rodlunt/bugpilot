name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to…
        2. Click…
        3. See error
  - type: textarea
    id: context
    attributes:
      label: Environment
      placeholder: Browser, OS, widget version, any relevant config.
