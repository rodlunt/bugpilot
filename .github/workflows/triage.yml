name: bugpilot triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'user-feedback') && contains(github.event.issue.body, '<!-- bugpilot:structured')
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./actions/triage
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          ntfy-topic: ${{ secrets.NTFY_TOPIC }}
          ntfy-token: ${{ secrets.NTFY_TOKEN }}
          webhook-secret: ${{ secrets.WEBHOOK_SECRET }}
          bugpilot-worker-url: ${{ secrets.BUGPILOT_WORKER_URL }}
