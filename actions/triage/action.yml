name: 'bugpilot triage'
description: 'Claude-powered triage for bugpilot issues — classifies, assesses severity, and drafts a proposed fix'
inputs:
  anthropic-api-key:
    description: 'Anthropic API key (BYO)'
    required: true
  github-token:
    description: 'GitHub token with issues:write and actions:write'
    default: ${{ github.token }}
  model:
    description: 'Claude model ID'
    default: 'claude-sonnet-4-6'
  ntfy-topic:
    description: 'NTFY topic URL (e.g. https://ntfy.businessreview360.au/br360-bugs). Leave empty to skip notifications.'
    required: false
  ntfy-token:
    description: 'Bearer token for authenticated self-hosted NTFY server. Leave empty for public topics.'
    required: false
  webhook-secret:
    description: 'Shared secret for the apply-fix Worker webhook endpoint'
    required: false
  bugpilot-worker-url:
    description: 'Base URL of the deployed bugpilot Worker (e.g. https://bugpilot-worker.your-account.workers.dev). Required for the 🟢 Approve button to trigger apply-fix.'
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'
