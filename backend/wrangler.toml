name = "bugpilot-worker"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Required secrets (set via: wrangler secret put GITHUB_TOKEN)
# GITHUB_TOKEN   — classic PAT with repo scope (issues + contents write)
# GITHUB_REPO    — "owner/repo"

[vars]
# Non-secret defaults — override per deployment
ALLOWED_ORIGIN = "*"
