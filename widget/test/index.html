<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bugpilot widget — test harness</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 40px;
      background: #f1f5f9;
      color: #0f172a;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 32px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      max-width: 480px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 14px;
    }
    button {
      padding: 8px 16px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    code { font-size: 12px; background: #f8fafc; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>bugpilot test harness</h1>
  <p>The widget posts to the endpoint below. Use a local Worker dev server or a mock endpoint.</p>

  <div class="card">
    <label for="endpoint">Endpoint URL</label>
    <input id="endpoint" type="url" value="https://bugpilot-worker.rodlunt.workers.dev/feedback" />
    <label for="project">Project name</label>
    <input id="project" type="text" value="Test Harness" />
    <button onclick="reinit()">Reinit widget with these settings</button>
  </div>

  <div class="card">
    <p style="margin:0; font-size:13px; color:#64748b">
      The feedback button appears at bottom-right.<br/>
      You can also trigger it programmatically via <code>BugPilot.open()</code> in the browser console.
    </p>
  </div>

  <script type="module">
    import BugPilot from '../src/index.js'

    window.BugPilot = BugPilot

    function init() {
      const endpoint = document.getElementById('endpoint').value
      const projectName = document.getElementById('project').value
      BugPilot.init({
        endpoint,
        projectName,
        position: 'bottom-right',
        labels: ['bug', 'test'],
      })
    }

    window.reinit = () => {
      BugPilot.destroy()
      // Remove DOM nodes left by previous instance
      document.querySelectorAll('.bp-trigger, .bp-dialog, .bp-backdrop').forEach(el => el.remove())
      init()
    }

    init()
  </script>
</body>
</html>
